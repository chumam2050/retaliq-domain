name: Retaliq Domain CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper-compat golang-go devscripts

      - name: Build & test via Makefile
        run: make all
        # Note: I removed the 'rm -rf' commands. 
        # Keep the files here so we can upload them!

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: dist/ # This saves everything in your dist folder

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
          path: dist/

      - name: Install rclone
        uses: shogo82148/actions-setup-rclone@v1

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone/
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      - name: Upload to Google Drive
        run: |
          # Sync the dist folder to the remote
          rclone copy dist/ gdrive:retaliq/repos