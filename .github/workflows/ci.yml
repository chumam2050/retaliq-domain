name: Retaliq Domain CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper-compat golang-go devscripts

      - name: Build & test via Makefile
        run: make all

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: dist/

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
          path: dist/

      - name: Install rclone
        run: |
          # Official Rclone install script
          sudo curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone/
          printf '%s' "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf
      - name: Verify Rclone Setup
        run: |
          # This helps you debug if the config is read correctly
          rclone listremotes

      - name: Upload to Google Drive
        run: |
          # Copy files to your specific folder path
          rclone copy dist/ gdrive:retaliq/repos