name: Retaliq Domain CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper-compat golang-go devscripts

      - name: Build & test via Makefile
        run: |
          # `make all` runs tests and produces binaries/packages
          make all
          # clean up build artifacts
          sudo rm -rf debian/.debhelper
          sudo rm -rf dist 
          sudo rm -rf retaliq-domain
          sudo rm -rf retaliq-domain*darwin* 
          sudo rm -rf retaliq-domain*windows*
          sudo rm -rf retaliq-domain_*.deb

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Upload to Google Drive
        uses: glotlabs/drive-upload@v1
        with:
          config: ${{ secrets.GDRIVE_CREDENTIALS }}
          folderId: ${{ vars.GDRIVE_FOLDER_ID }}
          files: 'dist/**'
