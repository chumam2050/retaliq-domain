name: Retaliq Domain CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper-compat golang-go devscripts

      - name: Build & test via Makefile
        run: make all

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: dist/

